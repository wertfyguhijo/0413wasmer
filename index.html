<!DOCTYPE html>

            color: #333;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px 0;
            text-align: center;
        }
        main {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        article {
            border-bottom: 1px solid #ddd;
            padding: 20px 0;
        }
        article:last-child {
            border-bottom: none;
        }
        h2 {
            color: #4CAF50;
        }
        footer {
            text-align: center;
            padding: 20px;
            margin-top: 20px;
            background-color: #eee;
        }
        a {
            color: #4CAF50;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
